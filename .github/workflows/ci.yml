name: Java CI Build

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create WAR file manually
        run: |
          mkdir -p build/WEB-INF/classes
          cp -r src/* build/WEB-INF/classes/
          cp -r web/* build/
          cd build
          jar -cvf MyFiles.war .