name: Java CI Build

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create WAR file manually
        run: |
          echo "Starting manual WAR build"
          mkdir -p build/WEB-INF/classes
          cp -r src/* build/WEB-INF/classes/ || true
          cp -r web/* build/ || true
          cd build
          jar -cvf MyFiles.war .
          echo "WAR file created"